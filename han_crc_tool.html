<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAN Meter CRC Tool</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f12;
    --surface: #14181e;
    --surface2: #1c2128;
    --border: #2a3140;
    --accent: #00e5a0;
    --accent2: #0090ff;
    --warn: #ff6b35;
    --text: #e8edf5;
    --text2: #7a8799;
    --text3: #4a5568;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
    --radius: 8px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2.5rem;
    border-left: 3px solid var(--accent);
    padding-left: 1.25rem;
  }

  header h1 {
    font-size: 1.75rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  header p {
    font-size: 0.85rem;
    color: var(--text2);
    margin-top: 0.35rem;
    font-weight: 400;
  }

  .step-label {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.75rem;
  }

  .step-num {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--accent);
    color: #000;
    font-size: 0.65rem;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }

  .panel-title {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 1rem;
  }

  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.75rem;
    padding: 0.9rem 1rem;
    resize: vertical;
    min-height: 100px;
    line-height: 1.6;
    transition: border-color 0.2s;
    outline: none;
  }

  textarea:focus { border-color: var(--accent); }

  .options-row {
    display: flex;
    gap: 1rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }

  .opt-group {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }

  .opt-group label {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text2);
  }

  select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.75rem;
    padding: 0.45rem 0.75rem;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  select:focus { border-color: var(--accent); }

  .btn-row {
    display: flex;
    gap: 0.75rem;
    margin-top: 1.25rem;
    flex-wrap: wrap;
  }

  button {
    font-family: var(--sans);
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 0.6rem 1.4rem;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-primary {
    background: var(--accent);
    color: #000;
  }
  .btn-primary:hover { background: #00ffb3; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--text2); color: var(--text); }

  .btn-clear {
    background: transparent;
    color: var(--text3);
    border: 1px solid transparent;
    font-size: 0.75rem;
    padding: 0.6rem 1rem;
  }
  .btn-clear:hover { color: var(--warn); }

  /* Results */
  #reconstructResults, #crcResults { display: none; }
  #reconstructResults.visible, #crcResults.visible { display: block; }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 1.5rem 0;
  }

  .metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 0.75rem;
    margin-bottom: 1.25rem;
  }

  .metric {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.1rem;
  }

  .metric .m-label {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 0.4rem;
  }

  .metric .m-val {
    font-family: var(--mono);
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--text);
  }

  .metric .m-sub {
    font-size: 0.65rem;
    color: var(--text3);
    margin-top: 0.25rem;
    font-family: var(--mono);
  }

  .verdict {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 1rem 1.25rem;
    border-radius: var(--radius);
    margin-bottom: 1.25rem;
    font-size: 0.9rem;
    font-weight: 600;
  }

  .verdict.match {
    background: rgba(0, 229, 160, 0.08);
    border: 1px solid rgba(0, 229, 160, 0.3);
    color: var(--accent);
  }

  .verdict.mismatch {
    background: rgba(255, 107, 53, 0.08);
    border: 1px solid rgba(255, 107, 53, 0.3);
    color: var(--warn);
  }

  .verdict.computed {
    background: rgba(0, 144, 255, 0.08);
    border: 1px solid rgba(0, 144, 255, 0.3);
    color: var(--accent2);
  }

  .verdict-icon {
    font-size: 1.1rem;
  }

  .code-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    font-family: var(--mono);
    font-size: 0.72rem;
    line-height: 1.7;
    white-space: pre;
    overflow-x: auto;
    color: var(--text2);
    max-height: 260px;
    overflow-y: auto;
  }

  .code-block .line-ctrl { color: var(--text3); }
  .code-block .line-data { color: var(--text); }
  .code-block .line-end  { color: var(--accent); font-weight: 600; }

  .hex-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    font-family: var(--mono);
    font-size: 0.7rem;
    line-height: 1.8;
    white-space: pre;
    overflow-x: auto;
    color: var(--text2);
    max-height: 220px;
    overflow-y: auto;
  }

  .hex-addr { color: var(--text3); }
  .hex-bytes { color: var(--text); }
  .hex-ascii { color: var(--accent2); }

  .combos-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
  }

  .combos-table th {
    text-align: left;
    padding: 0.5rem 0.75rem;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    border-bottom: 1px solid var(--border);
  }

  .combos-table td {
    padding: 0.55rem 0.75rem;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    color: var(--text2);
  }

  .combos-table tr:last-child td { border-bottom: none; }
  .combos-table tr.match-row td { color: var(--text); }

  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.65rem;
    font-weight: 600;
    font-family: var(--sans);
  }
  .tag-match { background: rgba(0,229,160,0.15); color: var(--accent); }
  .tag-fail  { background: rgba(255,107,53,0.1);  color: #ff6b3588; }

  .section-head {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text3);
    margin: 1.25rem 0 0.6rem;
  }

  .error-msg {
    background: rgba(255,107,53,0.1);
    border: 1px solid rgba(255,107,53,0.3);
    border-radius: var(--radius);
    padding: 0.75rem 1rem;
    color: var(--warn);
    font-size: 0.8rem;
    margin-top: 0.75rem;
    display: none;
  }

  footer {
    margin-top: 3rem;
    font-size: 0.72rem;
    color: var(--text3);
    text-align: center;
    font-family: var(--mono);
  }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 600px) {
    .options-row { flex-direction: column; }
    .metrics { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>HAN Meter CRC Tool</h1>
    <p>Reconstruct P1 telegram · Verify or compute CRC16/IBM (ARC, poly 0x8005)</p>
  </header>

  <!-- Step 1 -->
  <div class="step-label"><div class="step-num">1</div> Input telegram</div>
  <div class="panel">
    <textarea id="inp" placeholder='Paste parsed JSON array, e.g. ["/LGF5E360", "0-0:1.0.0(...)", ..., "!AA92"]&#10;or raw telegram lines, one per line.'></textarea>

    <div class="options-row">
      <div class="opt-group">
        <label>Line endings</label>
        <select id="eol">
          <option value="crlf">CRLF  (\r\n)</option>
          <option value="lf">LF  (\n)</option>
        </select>
      </div>
      <div class="opt-group">
        <label>Empty line after header</label>
        <select id="emptyline">
          <option value="yes">Yes (standard)</option>
          <option value="no">No</option>
        </select>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn-primary" onclick="doReconstruct()">① Reconstruct Telegram</button>
      <button class="btn-primary" id="btnCrc" onclick="doComputeCrc()" style="background:var(--accent2);opacity:0.4;cursor:not-allowed;" disabled>② Compute CRC16/IBM</button>
      <button class="btn-secondary" onclick="tryAll()">Try all combinations</button>
      <button class="btn-clear" onclick="clearAll()">Clear</button>
    </div>

    <div class="error-msg" id="errMsg"></div>
  </div>

  <!-- Step 2: Reconstruction result -->
  <div class="results" id="reconstructResults">
    <div class="step-label"><div class="step-num">2</div> Reconstructed telegram</div>
    <div class="panel">
      <div class="code-block" id="telegramDisplay"></div>
      <div style="font-size:0.7rem;color:var(--text3);margin-top:0.6rem;font-family:var(--mono);" id="byteInfo"></div>
      <div style="font-size:0.75rem;color:var(--accent2);margin-top:0.75rem;font-family:var(--sans);" id="reconstructHint"></div>
    </div>
  </div>

  <!-- Step 3: CRC result -->
  <div class="results" id="crcResults">
    <div class="step-label"><div class="step-num">3</div> CRC16/IBM result</div>
    <div class="panel">
      <div id="verdictBox"></div>
      <div class="metrics" id="metricsBox"></div>
      <div class="section-head">Hex dump — CRC input bytes</div>
      <div class="hex-block" id="hexDump"></div>
    </div>
  </div>

  <!-- All combos -->
  <div id="allCombosPanel" style="display:none">
    <div class="step-label" style="margin-top:0.5rem"><div class="step-num">✦</div> All format combinations</div>
    <div class="panel">
      <table class="combos-table" id="combosTable"></table>
    </div>
  </div>

  <footer>CRC16/IBM · poly 0x8005 · init 0x0000 · refIn true · refOut true · xorOut 0x0000</footer>

</div>

<script>
// ── CRC16/IBM (ARC) ──────────────────────────────────────────────
function reflect(val, bits) {
  let r = 0;
  for (let i = 0; i < bits; i++)
    if (val & (1 << i)) r |= (1 << (bits - 1 - i));
  return r;
}

function crc16ibm(bytes) {
  let crc = 0x0000;
  for (let b of bytes) {
    b = reflect(b, 8);
    crc ^= b << 8;
    for (let i = 0; i < 8; i++)
      crc = (crc & 0x8000) ? ((crc << 1) ^ 0x8005) : (crc << 1);
    crc &= 0xFFFF;
  }
  return reflect(crc, 16);
}

function crc16ccitt(bytes, init) {
  let crc = init;
  for (let b of bytes) {
    crc ^= b << 8;
    for (let i = 0; i < 8; i++)
      crc = (crc & 0x8000) ? ((crc << 1) ^ 0x1021) : (crc << 1);
    crc &= 0xFFFF;
  }
  return crc;
}

// ── Parse input ──────────────────────────────────────────────────
function parseInput(raw) {
  let lines;
  try {
    const parsed = JSON.parse(raw);
    if (Array.isArray(parsed)) lines = parsed;
    else throw new Error();
  } catch {
    lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  }

  if (!lines.length) throw new Error('No input found.');
  const header = lines[0];
  if (!header.startsWith('/')) throw new Error('First element must start with /');

  const last = lines[lines.length - 1];
  const crcMatch = last.match(/^!([0-9A-Fa-f]{4})$/);
  const bareEnd  = last === '!';

  let expectedCrc = null;
  let dataLines;

  if (crcMatch) {
    expectedCrc = crcMatch[1].toUpperCase();
    dataLines = lines.slice(1, -1);
  } else if (bareEnd) {
    dataLines = lines.slice(1, -1);
  } else {
    // no ! at all — treat everything after header as data
    dataLines = lines.slice(1);
  }

  return { header, dataLines, expectedCrc };
}

// ── Reconstruct telegram ─────────────────────────────────────────
function reconstruct(header, dataLines, eol, emptyLine) {
  const nl = eol === 'crlf' ? '\r\n' : '\n';
  let t = header + nl;
  if (emptyLine) t += nl;
  for (const l of dataLines) t += l + nl;
  t += '!';
  return t;
}

// ── Hex dump ─────────────────────────────────────────────────────
function hexdump(bytes) {
  let out = '';
  for (let i = 0; i < bytes.length; i += 16) {
    const s = bytes.slice(i, i + 16);
    const addr  = i.toString(16).padStart(4,'0');
    const hex   = Array.from(s).map(b => b.toString(16).padStart(2,'0')).join(' ').padEnd(47,' ');
    const ascii = Array.from(s).map(b => (b >= 32 && b < 127) ? String.fromCharCode(b) : '·').join('');
    out += `${addr}  ${hex}  ${ascii}\n`;
  }
  return out;
}

// ── Render telegram with syntax highlighting ─────────────────────
function renderTelegram(telegram) {
  const lines = telegram.replace(/\r\n/g, '\r\n').split('\n');
  return lines.map(line => {
    const raw = line.replace(/\r$/, '');
    const ctrl = line.endsWith('\r') ? ' <span class="line-ctrl">\\r\\n</span>' : '';
    if (raw === '') return `<span class="line-ctrl">          ← empty line (\\r\\n)</span>`;
    if (raw === '!') return `<span class="line-end">!</span><span class="line-ctrl">          ← CRC computed up to here (inclusive)</span>`;
    if (raw.startsWith('/')) return `<span style="color:#00e5a0;font-weight:600">${esc(raw)}</span>${ctrl}`;
    return `<span class="line-data">${esc(raw)}</span>${ctrl}`;
  }).join('\n');
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── State shared between steps ───────────────────────────────────
let _telegramBytes = null;
let _expectedCrc   = null;

// ── Step 1: Reconstruct ──────────────────────────────────────────
function doReconstruct() {
  const raw   = document.getElementById('inp').value.trim();
  const errEl = document.getElementById('errMsg');
  errEl.style.display = 'none';
  _telegramBytes = null;
  _expectedCrc   = null;

  try {
    const { header, dataLines, expectedCrc } = parseInput(raw);
    const eol       = document.getElementById('eol').value;
    const emptyLine = document.getElementById('emptyline').value === 'yes';

    const telegram = reconstruct(header, dataLines, eol, emptyLine);
    _telegramBytes = new TextEncoder().encode(telegram);
    _expectedCrc   = expectedCrc;

    document.getElementById('telegramDisplay').innerHTML = renderTelegram(telegram);
    document.getElementById('byteInfo').textContent =
      `${_telegramBytes.length} bytes  ·  / through ! inclusive  ·  CRC value not included`;
    document.getElementById('reconstructHint').textContent =
      '✓ Reconstruction complete — click "Compute CRC16/IBM" to calculate the checksum';

    document.getElementById('reconstructResults').classList.add('visible');
    document.getElementById('crcResults').classList.remove('visible');
    document.getElementById('allCombosPanel').style.display = 'none';

    // Enable CRC button
    const btn = document.getElementById('btnCrc');
    btn.disabled = false;
    btn.style.opacity = '1';
    btn.style.cursor = 'pointer';

  } catch(e) {
    errEl.textContent = 'Error: ' + e.message;
    errEl.style.display = 'block';
  }
}

// ── Step 2: Compute CRC16/IBM ────────────────────────────────────
function doComputeCrc() {
  const errEl = document.getElementById('errMsg');
  errEl.style.display = 'none';

  if (!_telegramBytes) {
    errEl.textContent = 'Run "Reconstruct Telegram" first.';
    errEl.style.display = 'block';
    return;
  }

  try {
    const computed    = crc16ibm(_telegramBytes);
    const computedHex = computed.toString(16).toUpperCase().padStart(4,'0');

    // Verdict
    const vBox = document.getElementById('verdictBox');
    if (_expectedCrc) {
      const ok = computedHex === _expectedCrc;
      vBox.innerHTML = `<div class="verdict ${ok ? 'match' : 'mismatch'}">
        <span class="verdict-icon">${ok ? '✓' : '✗'}</span>
        ${ok
          ? `CRC verified — computed <strong>${computedHex}</strong> matches telegram value`
          : `CRC mismatch — computed <strong>${computedHex}</strong>, expected <strong>${_expectedCrc}</strong>`}
      </div>`;
    } else {
      vBox.innerHTML = `<div class="verdict computed">
        <span class="verdict-icon">◈</span>
        No CRC in telegram — computed value: <strong>${computedHex}</strong>
        &nbsp;→&nbsp; append <strong>!${computedHex}</strong> to telegram
      </div>`;
    }

    // Metrics
    const mBox = document.getElementById('metricsBox');
    let html = `
      <div class="metric">
        <div class="m-label">CRC16/IBM result</div>
        <div class="m-val">${computedHex}</div>
        <div class="m-sub">libscrc.ibm().to_bytes(2,'big').hex()</div>
      </div>
      <div class="metric">
        <div class="m-label">As decimal</div>
        <div class="m-val">${computed}</div>
        <div class="m-sub">uint16</div>
      </div>
      <div class="metric">
        <div class="m-label">Telegram size</div>
        <div class="m-val">${_telegramBytes.length}</div>
        <div class="m-sub">bytes (CRC input)</div>
      </div>`;
    if (_expectedCrc) {
      html += `<div class="metric">
        <div class="m-label">Expected CRC</div>
        <div class="m-val">${_expectedCrc}</div>
        <div class="m-sub">from telegram</div>
      </div>`;
    } else {
      html += `<div class="metric">
        <div class="m-label">Append as</div>
        <div class="m-val" style="font-size:1.1rem">!${computedHex}</div>
        <div class="m-sub">replaces bare !</div>
      </div>`;
    }
    mBox.innerHTML = html;

    document.getElementById('hexDump').textContent = hexdump(_telegramBytes);
    document.getElementById('crcResults').classList.add('visible');
    document.getElementById('allCombosPanel').style.display = 'none';

  } catch(e) {
    errEl.textContent = 'Error: ' + e.message;
    errEl.style.display = 'block';
  }
}

// ── Try all combinations ─────────────────────────────────────────
function tryAll() {
  const raw   = document.getElementById('inp').value.trim();
  const errEl = document.getElementById('errMsg');
  errEl.style.display = 'none';

  try {
    const { header, dataLines, expectedCrc } = parseInput(raw);

    const combos = [
      { eol:'crlf', empty:true,  algo:'ibm',   init:0,      label:'CRLF · empty line · CRC16/IBM' },
      { eol:'crlf', empty:true,  algo:'ccitt',  init:0x0000, label:'CRLF · empty line · CRC16/CCITT (0x0000)' },
      { eol:'crlf', empty:true,  algo:'ccitt',  init:0xFFFF, label:'CRLF · empty line · CRC16/CCITT-FALSE' },
      { eol:'crlf', empty:false, algo:'ibm',   init:0,      label:'CRLF · no empty line · CRC16/IBM' },
      { eol:'crlf', empty:false, algo:'ccitt',  init:0x0000, label:'CRLF · no empty line · CRC16/CCITT (0x0000)' },
      { eol:'crlf', empty:false, algo:'ccitt',  init:0xFFFF, label:'CRLF · no empty line · CRC16/CCITT-FALSE' },
      { eol:'lf',   empty:true,  algo:'ibm',   init:0,      label:'LF · empty line · CRC16/IBM' },
      { eol:'lf',   empty:true,  algo:'ccitt',  init:0x0000, label:'LF · empty line · CRC16/CCITT (0x0000)' },
      { eol:'lf',   empty:true,  algo:'ccitt',  init:0xFFFF, label:'LF · empty line · CRC16/CCITT-FALSE' },
      { eol:'lf',   empty:false, algo:'ibm',   init:0,      label:'LF · no empty line · CRC16/IBM' },
      { eol:'lf',   empty:false, algo:'ccitt',  init:0x0000, label:'LF · no empty line · CRC16/CCITT (0x0000)' },
      { eol:'lf',   empty:false, algo:'ccitt',  init:0xFFFF, label:'LF · no empty line · CRC16/CCITT-FALSE' },
    ];

    const enc = new TextEncoder();
    let rows = `<tr>
      <th>Result</th><th>Configuration</th>
      ${expectedCrc ? '<th>vs ' + expectedCrc + '</th>' : ''}
    </tr>`;

    for (const c of combos) {
      const t     = reconstruct(header, dataLines, c.eol, c.empty);
      const bytes = enc.encode(t);
      const res   = c.algo === 'ibm' ? crc16ibm(bytes) : crc16ccitt(bytes, c.init);
      const hex   = res.toString(16).toUpperCase().padStart(4,'0');
      const ok    = expectedCrc && hex === expectedCrc;
      rows += `<tr class="${ok ? 'match-row' : ''}">
        <td style="font-weight:600;color:${ok ? 'var(--accent)' : 'var(--text2)'}">${hex}</td>
        <td style="font-family:var(--sans);color:var(--text2)">${c.label}</td>
        ${expectedCrc ? `<td><span class="tag ${ok ? 'tag-match' : 'tag-fail'}">${ok ? 'Match' : '—'}</span></td>` : ''}
      </tr>`;
    }

    document.getElementById('combosTable').innerHTML = rows;
    document.getElementById('allCombosPanel').style.display = 'block';

    // Also run reconstruct so state is set
    doReconstruct();
    document.getElementById('allCombosPanel').style.display = 'block';

  } catch(e) {
    errEl.textContent = 'Error: ' + e.message;
    errEl.style.display = 'block';
  }
}

function clearAll() {
  document.getElementById('inp').value = '';
  document.getElementById('reconstructResults').classList.remove('visible');
  document.getElementById('crcResults').classList.remove('visible');
  document.getElementById('allCombosPanel').style.display = 'none';
  document.getElementById('errMsg').style.display = 'none';
  _telegramBytes = null;
  _expectedCrc   = null;
  const btn = document.getElementById('btnCrc');
  btn.disabled = true;
  btn.style.opacity = '0.4';
  btn.style.cursor = 'not-allowed';
}
</script>
